name: fitness_app
description: Unified fitness app for members and trainers
publish_to: none

environment:
  sdk: ^3.12.0-0

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../shared
  flutter_dotenv: ^5.1.0
  go_router: ^14.8.0
  flutter_riverpod: ^2.6.1
  fl_chart: ^0.70.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.9
  fluent_ui: ^4.8.0
  flutter_animate: ^4.5.0
  haptic_feedback: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
